<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Surf Condition Map (5 Days)</title>

    <!-- ===== Google AdSense ローダー =====
         ※ client= の「ca-pub-XXXXXXXXXXXXXXXX」はプレースホルダ。
            AdSense管理画面で発行される実際のパブリッシャーIDに差し替えること。
            （広告配信には AdSense の審査通過と、サイトルートへの ads.txt 設置が必要） -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
            crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* --- 配色・質感のCSS変数（ガラスモーフィズム基調） --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.55);
            --glass-shadow: 0 8px 32px rgba(10, 30, 60, 0.18);
            --accent: #2f80ed;
            --accent-deep: #1b5fc4;
            --text-main: #1f2d3d;
            --text-sub: #66788c;
            --line: rgba(31, 45, 61, 0.08);
            --danger: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; color: var(--text-main);
        }
        /* 地図の背景（タイル読み込み前の下地） */
        #map { height: 100%; width: 100%; background: #dde6ee; }

        /* --- 情報パネル（ガラス調） --- */
        #info-panel {
            position: absolute; top: 15px; right: 15px; width: 280px;
            background: var(--glass-bg);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 1000; display: none;
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            pointer-events: auto;
        }

        #p-data-time {
            position: absolute; top: 14px; right: 16px;
            font-size: 0.75rem; color: var(--danger); font-weight: bold;
        }

        h3#p-name {
            margin-top: 0; margin-bottom: 10px;
            font-size: 1.08rem; font-weight: 700;
            letter-spacing: 0.02em; line-height: 1.25;
        }

        .row {
            display: flex; justify-content: space-between;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 4px;
            align-items: baseline;
        }

        .label { color: var(--text-sub); font-size: 0.78rem; letter-spacing: 0.04em; }
        .val { font-weight: bold; color: var(--text-main); text-align: right; font-size: 0.9rem; }
        .sub-val { font-size: 0.75rem; color: #8a97a6; font-weight: normal; display: block; line-height: 1.2; }

        .note-text {
            font-size: 0.65rem; color: #9aa6b3;
            margin-top: 2px; margin-bottom: 6px;
            line-height: 1.2; text-align: right;
        }

        .tide-tag {
            display: inline-block; padding: 2px 8px; border-radius: 999px;
            font-size: 0.72rem; color: white;
            background: linear-gradient(135deg, #51606f, #2c3a48);
            margin-right: 4px; letter-spacing: 0.05em;
        }
        .tide-trend { font-weight: bold; color: var(--accent); font-size: 0.85rem; }
        .tide-trend.down { color: #dc3545; }

        /* うねりの入りやすさ(向きの相性)の色分け */
        .sw-good { color: #1e8e3e; font-weight: bold; }
        .sw-ok   { color: #2e9e4f; }
        .sw-weak { color: #f39c12; }
        .sw-bad  { color: var(--danger); font-weight: bold; }

        #tide-graph-container {
            margin-top: 6px; text-align: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.65), rgba(47,128,237,0.08));
            border-radius: 10px; padding: 6px 0; border: 1px solid var(--line);
        }
        canvas { width: 100%; height: 50px; display: block; }
        .graph-labels { font-size: 0.65rem; color: #9aa6b3; display: flex; justify-content: space-between; padding: 0 8px; margin-top: 2px; }

        /* --- マーカー --- */
        .surf-pin-container {
            position: relative; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .wave-core {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.95);
            box-shadow: 0 2px 6px rgba(0,0,0,0.35);
            z-index: 2;
            /* 従来JSのインラインstyleで掛けていた scale(1.3) をCSSへ移動（hover時の拡大を有効化） */
            transform: scale(1.3);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .surf-pin-container:hover .wave-core {
            transform: scale(1.55);
            box-shadow: 0 0 16px rgba(0,0,0,0.45);
            cursor: pointer;
        }

        .wind-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; transition: transform 0.5s linear;
        }
        .arrow-pointer {
            position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-bottom: 14px solid #888; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        /* 実効波高によるマーカー色（青=小 / 黄=中 / 赤=大 / 灰=データなし） */
        .c-calm { background: #3498db; }
        .c-mod { background: #f1c40f; }
        .c-high { background: #e74c3c; }
        .c-none { background: #b0b0b0; }

        /* --- タイムスライダー & コントロール（ガラス調） --- */
        /* bottom は下部の広告枠(50px)と重ならない高さに設定 */
        #time-control {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 24px; box-shadow: var(--glass-shadow);
            z-index: 2000;
            display: flex; flex-direction: row; align-items: center; gap: 15px;
            transition: all 0.3s ease;
        }

        #play-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; flex-shrink: 0;
            background: linear-gradient(135deg, #3aa0ff, var(--accent-deep));
            color: white; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(47, 128, 237, 0.45);
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        #play-btn:hover { transform: scale(1.07); box-shadow: 0 6px 16px rgba(47, 128, 237, 0.55); }

        .slider-wrapper { flex-grow: 1; position: relative; }

        input[type=range] {
            width: 100%; cursor: pointer; margin: 0;
            height: 6px; -webkit-appearance: none;
            background: linear-gradient(to right, rgba(47,128,237,0.45), rgba(47,128,237,0.15));
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            background: linear-gradient(135deg, #3aa0ff, var(--accent-deep));
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            border-radius: 50%; cursor: pointer;
        }

        /* 日付ラベル (JSで生成) */
        .slider-labels {
            display: flex; justify-content: space-between; margin-top: 4px;
            font-size: 0.6rem; color: var(--text-sub); padding: 0 2px;
        }

        #current-time-display {
            font-size: 0.95rem; font-weight: bold; color: var(--text-main);
            min-width: 110px; text-align: center;
        }

        /* --- Copyright --- */
        #copyright {
            position: absolute; bottom: 5px; left: 10px;
            font-size: 0.6rem; color: rgba(0,0,0,0.65);
            z-index: 1000; pointer-events: auto;
            text-align: left;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 3px 8px; border-radius: 6px;
            line-height: 1.2;
        }
        #copyright a { color: #333; text-decoration: none; border-bottom: 1px dotted #999; }

        /* --- AdSense 広告枠（画面右下。スライダー/パネルの操作を阻害しない配置） --- */
        #ad-container {
            position: absolute; bottom: 8px; right: 10px;
            width: 320px; height: 50px;
            max-width: calc(100% - 20px);
            z-index: 900; /* 情報パネル(1000)・タイムスライダー(2000)より下 */
            border-radius: 8px; overflow: hidden;
            background: rgba(255,255,255,0.35);
            text-align: center;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 248, 252, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; color: #4a5a6a;
            letter-spacing: 0.08em;
        }

        /* --- スマホ用レイアウト調整 --- */
        @media (max-width: 600px) {
            /* 下から「コピーライト→広告→スライダー」の順に積んで重なりを防ぐ */
            #time-control {
                bottom: 84px; padding: 10px 15px; width: 92%; border-radius: 18px;
                flex-wrap: wrap; gap: 8px;
            }

            #current-time-display {
                width: 100%; order: -1; margin-bottom: 2px; font-size: 1.0rem;
                border-bottom: 1px solid var(--line); padding-bottom: 4px;
            }

            #play-btn { width: 36px; height: 36px; font-size: 0.9rem; }
            .slider-wrapper { width: calc(100% - 46px); }

            #info-panel {
                width: 90%;
                top: 15px;
                left: 0; right: 0; margin: 0 auto;
                padding: 12px 15px;
            }

            #copyright { bottom: 2px; left: 5px; font-size: 0.55rem; padding: 2px 5px; }

            #ad-container {
                bottom: 28px; right: 50%; transform: translateX(50%);
                width: 320px; height: 50px;
            }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">データ取得中...</div>

    <div id="map"></div>
    
    <div id="copyright">
        &copy; 2025 Slosea. All rights reserved.<br>
        Weather data by <a href="https://open-meteo.com/" target="_blank">Open-Meteo.com</a> | Map &copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>
    </div>

    <!-- ===== Google AdSense 広告ユニット =====
         ※ data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" と data-ad-slot="0000000000" はプレースホルダ。
            審査通過後に実際のパブリッシャーID・広告スロットIDへ差し替えること。 -->
    <div id="ad-container">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="0000000000"></ins>
    </div>
    <script>
        // 広告ユニットを初期化（ローダー読み込み後に自動で広告が描画される）
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <div id="time-control">
        <div id="current-time-display">現在</div>
        <button id="play-btn">▶</button>
        <div class="slider-wrapper">
            <input type="range" id="time-slider" min="0" max="119" value="0" step="1">
            <div id="slider-labels" class="slider-labels">
                </div>
        </div>
    </div>

    <div id="info-panel">
        <div id="p-data-time">現在</div>
        <h3 id="p-name">-</h3>
        
        <div class="row" style="border-bottom: none; margin-bottom: 0;">
            <span class="label">波高 (目安)</span>
            <div style="text-align:right;">
                <div id="p-wave-cond" class="val">-</div>
                <div id="p-wave" class="sub-val">- m</div>
            </div>
        </div>
        <div class="note-text" style="padding-bottom: 4px; border-bottom: 1px solid #eee;">
            ※地形や潮回りによりサイズは前後します
        </div>

        <div class="row">
            <span class="label">うねり</span>
            <div style="text-align:right;">
                <span id="p-swell" class="val">-</span>
                <div id="p-swell-fit" class="sub-val">-</div>
            </div>
        </div>

        <div class="row">
            <span class="label">風速</span>
            <div style="text-align:right;">
                <span id="p-wind" class="val">-</span>
                <div id="p-wdir" class="sub-val">-</div>
            </div>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin: 4px 0 8px 0;">

        <div class="row" style="border: none; margin-bottom: 2px;">
            <span class="label">潮回り</span>
            <div style="text-align:right;">
                <div style="margin-bottom:2px;">
                    <span id="p-tide-name" class="tide-tag">-</span>
                    <span id="p-moon-age" style="font-size:0.75rem; color:#999;">(月齢 -)</span>
                </div>
                <div id="p-tide-trend" class="val">-</div>
            </div>
        </div>

        <div id="tide-graph-container">
            <canvas id="tideCanvas" width="280" height="50"></canvas>
            <div class="graph-labels">
                <span>0</span><span>6</span><span>12</span><span>18</span><span>24</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 状態管理 ---
        let globalData = [];
        // 各ポイントの実測潮位(海面高 MSL基準)。タイムスタンプ文字列 -> 海面高(m) のMapを保持
        let globalTide = [];
        let currentHourIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let selectedSpotIndex = null;
        
        // 5日分(120時間)のDateオブジェクト生成
        const today = new Date();
        const hourLabels = [];
        const daysToShow = 5;
        const totalHours = 24 * daysToShow;

        for(let i=0; i<totalHours; i++) {
            const d = new Date(today.getTime());
            d.setHours(today.getHours() + i);
            d.setMinutes(0);
            hourLabels.push(d);
        }

        // スライダーの下に日付ラベルを生成 (0, 24, 48, 72, 96時間目)
        const sliderLabelsEl = document.getElementById('slider-labels');
        sliderLabelsEl.innerHTML = '';
        for(let i=0; i<daysToShow; i++) {
            const target = hourLabels[i * 24];
            const m = target.getMonth() + 1;
            const d = target.getDate();
            const span = document.createElement('span');
            span.innerText = `${m}/${d}`;
            sliderLabelsEl.appendChild(span);
        }

        // --- マップ初期化 ---
        const southWest = L.latLng(20.0, 122.0);
        const northEast = L.latLng(46.0, 154.0);
        const bounds = L.latLngBounds(southWest, northEast);

        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false, 
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            minZoom: 5
        }).setView([37.5, 139.0], 5); 

        L.control.zoom({ position: 'topleft' }).addTo(map);

        // ★★★ 国土地理院の淡色地図に変更（日本語・シンプル） ★★★
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">地理院タイル</a>',
            bounds: bounds
        }).addTo(map);
        // ★★★ 変更終了 ★★★

        map.on('click', () => {
            document.getElementById('info-panel').style.display = 'none';
            selectedSpotIndex = null;
        });
        const panel = document.getElementById('info-panel');
        L.DomEvent.disableClickPropagation(panel);
        L.DomEvent.disableClickPropagation(document.getElementById('time-control'));

        // --- ポイント定義 ---
        const spots = [
            { name: "北海道 - 浜厚真", lat: 42.5997, lon: 141.8301, face: 200.0, open: 170 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(字浜厚真)
            { name: "北海道 - 銭函", lat: 43.1602, lon: 141.208, face: 350.0, open: 150 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(銭函三丁目)
            { name: "北海道 - 室蘭イタンキ", lat: 42.3290, lon: 141.0250, face: 130.0, open: 190 }, // 修正: 沖1.3km→イタンキ浜のブレイク位置へ
            { name: "北海道 - 浜中", lat: 43.1376, lon: 145.1378, face: 150.0, open: 110 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(後静)
            { name: "青森 - 三沢", lat: 40.702, lon: 141.428, face: 70.0, open: 170 },
            { name: "青森 - 深浦", lat: 40.6502, lon: 139.9265, face: 320.0, open: 130 }, // 修正: 海岸沿いへ微調整
            { name: "岩手 - 久慈", lat: 40.199, lon: 141.7918, face: 85.0, open: 80 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(湊町)
            { name: "岩手 - 浪板", lat: 39.3849, lon: 141.9394, face: 80.0, open: 50 }, // 修正(GSI地名検索): 船越→浪板海岸へ(GSI地名)
            { name: "秋田 - 男鹿", lat: 39.9727, lon: 139.8418, face: 340.0, open: 130 }, // 修正: 男鹿の代表ポイント宮沢海岸(五里合)へ 
            { name: "宮城 - 仙台新港", lat: 38.276, lon: 141.026, face: 140.0, open: 110 },
            { name: "山形 - 湯野浜", lat: 38.7781, lon: 139.7469, face: 305.0, open: 160 }, // 修正(GSI地名検索): 沖→湯野浜海水浴場へ
            { name: "福島 - 北泉", lat: 37.6512, lon: 141.0243, face: 85.0, open: 180 }, // 修正: 外洋20km沖→南相馬市北泉海岸へ 
            { name: "福島 - 岩沢", lat: 37.2735, lon: 141.0198, face: 95.0, open: 180 }, // 修正: 外洋20km沖→楢葉町岩沢海岸へ 
            { name: "福島 - 勿来", lat: 36.87, lon: 140.7914, face: 105.0, open: 120 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(勿来町)
            
            { name: "新潟 - 直江津", lat: 37.1818, lon: 138.2478, face: 325.0, open: 140 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(港町一丁目)
            { name: "日本海 - 新潟", lat: 37.880, lon: 138.940, face: 325.0, open: 180 },
            { name: "石川 - 柴垣", lat: 36.9468, lon: 136.759, face: 275.0, open: 140 }, // 修正(GSI地名検索): 約4km南の誤り→柴垣海岸へ(GSI地名)
            { name: "福井 - 鳥居浜", lat: 35.4913, lon: 135.5583, face: 10.0, open: 90 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(薗部)
            { name: "京都 - 八丁浜", lat: 35.6914, lon: 135.0228, face: 340.0, open: 130 }, // 修正(GSI地名検索): 約3.5km東の誤り→八丁浜へ(GSI地名)
            { name: "京都 - 葛野浜", lat: 35.6499, lon: 134.9315, face: 340.0, open: 130 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(久美浜町湊宮)
            { name: "鳥取 - 白兎", lat: 35.5275, lon: 134.1170, face: 350.0, open: 170 }, // 修正: 沖→白兎海岸へ(約3km西)
            { name: "島根 - 波子", lat: 34.9680, lon: 132.1470, face: 320.0, open: 170 }, // 修正: 沖→江津市波子海岸へ

            { name: "茨城 - 河原子", lat: 36.5397, lon: 140.6453, face: 110.0, open: 170 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(河原子町三丁目)
            { name: "茨城 - 大洗", lat: 36.307, lon: 140.575, face: 115.0, open: 140 },
            { name: "茨城 - トップサンテ", lat: 36.1935, lon: 140.5714, face: 80.0, open: 170 }, // 修正: 海岸沿いへ微調整
            { name: "千葉 - 片貝", lat: 35.5333, lon: 140.4616, face: 125.0, open: 180 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(小関)
            { name: "千葉 - 一宮", lat: 35.365, lon: 140.395, face: 85.0, open: 160 },

        // --- うねりの「入りやすさ」判定 ---
        // 各ポイントの face(外洋に面する方位) と open(外洋が開けている角度幅) を使い、
        // うねりの到来方向(swellFrom)がそのポイントに入るかを評価する。
        // 湾(openが小さい)ほど受け入れ角が狭く、岬(openが大きい)ほど広く拾える。
        function swellExposure(spot, swellFrom) {
            if (spot.face === undefined || swellFrom === null || swellFrom === undefined) {
                return { factor: 1.0, label: '', cls: '', ang: null };
            }
            // face とうねり到来方向の角度差(0〜180°)
            const diff = Math.abs(((swellFrom - spot.face + 540) % 360) - 180);
            // 受け入れ半角: 開け幅の半分 + 回折ぶん12°(湾40°〜岬120°でクランプ)
            const half = Math.min(Math.max((spot.open || 160) / 2 + 12, 40), 120);
            const ratio = diff / half;
            // 向きが合っているうねり(ratio<0.5)はフルに反応させ、
            // 受け入れ角の外側(0.5→1.0)でのみ滑らかに減衰させる(沖モデルの過小化を防ぐ)
            let f;
            if (ratio >= 1)        f = 0;
            else if (ratio < 0.5)  f = 1.0;
            else                   f = Math.cos(((ratio - 0.5) / 0.5) * (Math.PI / 2));
            const factor = 0.25 + 0.75 * f;                            // 向き外でも25%は残る(回折/反射/風波)
            let label, cls;
            if (ratio < 0.45)      { label = '◎ ばっちり';     cls = 'sw-good'; }
            else if (ratio < 0.80) { label = '○ 入る';         cls = 'sw-ok';   }
            else if (ratio < 1.00) { label = '△ 弱め(オフ気味)'; cls = 'sw-weak'; }
            else                   { label = '× 向き合わず';    cls = 'sw-bad';  }
            return { factor, label, cls, ang: Math.round(diff) };
        }

        // ポイントに実際に入る波高(沖の波高 × うねりの入りやすさ)
        function effHeight(spot, data) {
            const e = swellExposure(spot, data.swell_dir);
            return data.wave_height * e.factor;
        }

        // --- Tide Logic ---
        // 潮名(大潮/中潮など)は天文(月齢)で決まる暦上の区分なので月齢から算出する。
        // 一方、潮位グラフと満ち引き(上げ潮/下げ潮)は実測ベースの sea_level_height_msl を使う。
        function getTideName(targetDate) {
            const knownNewMoon = new Date(2024, 0, 11, 20, 57); // 2024-01-11 20:57(JST)の新月を基準
            const cycle = 29.53059; // 朔望月(日)
            const diffDays = (targetDate.getTime() - knownNewMoon.getTime()) / (1000 * 60 * 60 * 24);
            let moonAge = diffDays % cycle;
            if (moonAge < 0) moonAge += cycle;

            // 旧暦日(1〜30)に対応する潮名(海上保安庁の標準的な区分に準拠)
            const lunarDate = Math.floor(moonAge) + 1;
            const tideTable = {
                1:'大潮', 2:'大潮', 3:'中潮', 4:'中潮', 5:'中潮', 6:'中潮', 7:'小潮', 8:'小潮', 9:'小潮',
                10:'長潮', 11:'若潮', 12:'中潮', 13:'中潮', 14:'中潮', 15:'大潮', 16:'大潮', 17:'大潮', 18:'大潮',
                19:'中潮', 20:'中潮', 21:'中潮', 22:'中潮', 23:'小潮', 24:'小潮', 25:'小潮', 26:'長潮', 27:'若潮',
                28:'中潮', 29:'中潮', 30:'大潮'
            };
            const name = tideTable[lunarDate] || '中潮';
            return { name, moonAge: moonAge.toFixed(1) };
        }

        // 指定ポイント・指定日時の実測潮位(海面高 m)を取得。なければ null
        function tideKey(d) {
            const y = d.getFullYear();
            const mo = String(d.getMonth() + 1).padStart(2, '0');
            const da = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            return `${y}-${mo}-${da}T${hh}:00`;
        }
        function getTideLevel(spotIndex, date) {
            const m = globalTide[spotIndex];
            if (!m) return null;
            const v = m.get(tideKey(date));
            return (v === undefined) ? null : v;
        }

        // 実測潮位の前後1時間から満ち引きの傾向を判定する
        function getTideTrend(spotIndex, date) {
            const cur = getTideLevel(spotIndex, date);
            if (cur === null) return { text: '-', cls: '' };
            const prevRaw = getTideLevel(spotIndex, new Date(date.getTime() - 3600 * 1000));
            const nextRaw = getTideLevel(spotIndex, new Date(date.getTime() + 3600 * 1000));
            const prev = (prevRaw === null) ? cur : prevRaw;
            const next = (nextRaw === null) ? cur : nextRaw;
            if (cur >= prev && cur >= next) return { text: '満潮付近 (止まり)', cls: 'tide-trend' };
            if (cur <= prev && cur <= next) return { text: '干潮付近 (止まり)', cls: 'tide-trend down' };
            if (next > cur) return { text: '上げ潮 ↗', cls: 'tide-trend' };
            return { text: '下げ潮 ↘', cls: 'tide-trend down' };
        }

        // --- Tide Graph (50px height) ---
        // 対象ポイント・対象日の実測潮位(0:00〜翌0:00)を折れ線で描画する
        function drawTideGraph(spotIndex, targetDate) {
            const canvas = document.getElementById('tideCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);

            // 対象日の0時〜翌0時(25点)の実測潮位を取得
            const dayStart = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate(), 0, 0, 0);
            const levels = [];
            for (let hr = 0; hr <= 24; hr++) {
                const d = new Date(dayStart.getTime());
                d.setHours(hr);
                levels.push(getTideLevel(spotIndex, d));
            }

            const valid = levels.filter(v => v !== null);
            if (valid.length < 2) {
                ctx.fillStyle = '#bbb';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('潮位データなし', w / 2, h / 2);
                return;
            }

            // 当日の最小〜最大で縦軸スケールを決める(変化が小さい場合は下限幅を確保)
            let min = Math.min(...valid);
            let max = Math.max(...valid);
            if (max - min < 0.2) { const mid = (max + min) / 2; min = mid - 0.5; max = mid + 0.5; }
            const range = max - min;
            const top = h * 0.15, bot = h * 0.9;
            const yOf = v => bot - ((v - min) / range) * (bot - top);
            const xOf = hr => (hr / 24) * w;

            const gradient = ctx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, "rgba(52, 152, 219, 0.6)");
            gradient.addColorStop(1, "rgba(52, 152, 219, 0.05)");

            // 塗りつぶし(下端→カーブ→下端で閉じる)
            ctx.beginPath();
            let started = false, lastX = 0;
            for (let hr = 0; hr <= 24; hr++) {
                if (levels[hr] === null) continue;
                const x = xOf(hr), y = yOf(levels[hr]);
                if (!started) { ctx.moveTo(x, h); ctx.lineTo(x, y); started = true; }
                else ctx.lineTo(x, y);
                lastX = x;
            }
            ctx.lineTo(lastX, h);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // 潮位カーブ
            ctx.beginPath();
            started = false;
            for (let hr = 0; hr <= 24; hr++) {
                if (levels[hr] === null) continue;
                const x = xOf(hr), y = yOf(levels[hr]);
                if (!started) { ctx.moveTo(x, y); started = true; }
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = "#3498db";
            ctx.lineWidth = 2;
            ctx.stroke();

            // 現在時刻の縦線
            const curHour = targetDate.getHours() + targetDate.getMinutes() / 60;
            const curX = xOf(curHour);
            ctx.beginPath();
            ctx.moveTo(curX, 0);
            ctx.lineTo(curX, h);
            ctx.strokeStyle = "rgba(231, 76, 60, 0.8)";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 2]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 現在の潮位(前後の実測値を線形補間)とマーカー
            const h0 = Math.floor(curHour), h1 = Math.min(24, h0 + 1);
            let curLevel = null;
            if (levels[h0] !== null && levels[h1] !== null) {
                const f = curHour - h0;
                curLevel = levels[h0] * (1 - f) + levels[h1] * f;
            } else if (levels[h0] !== null) {
                curLevel = levels[h0];
            }
            if (curLevel !== null) {
                const cy = yOf(curLevel);
                ctx.beginPath();
                ctx.arc(curX, cy, 4, 0, Math.PI * 2);
                ctx.fillStyle = "#e74c3c";
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 現在潮位の数値(MSL基準)を表示
                ctx.fillStyle = "#e74c3c";
                ctx.font = "bold 9px sans-serif";
                const rightSide = curX > w * 0.8;
                ctx.textAlign = rightSide ? "right" : "left";
                ctx.fillText(`${curLevel.toFixed(2)}m`, rightSide ? curX - 6 : curX + 6, cy - 6);
            }
        }

        // --- Data Fetching (5 Days Forecast) ---
        // 波・うねり・潮(marine)と風(forecast)をすべて取得してから表示する(元の挙動)。
        async function fetchForecastData() {
            const lats = spots.map(s => s.lat).join(',');
            const lons = spots.map(s => s.lon).join(',');
            const mUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lats}&longitude=${lons}&hourly=wave_height,swell_wave_direction,swell_wave_period,sea_level_height_msl&timezone=Asia%2FTokyo&forecast_days=6`;
            const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=Asia%2FTokyo&forecast_days=6`;

            const y = hourLabels[0].getFullYear();
            const mo = String(hourLabels[0].getMonth() + 1).padStart(2, '0');
            const da = String(hourLabels[0].getDate()).padStart(2, '0');
            const hh = String(hourLabels[0].getHours()).padStart(2, '0');
            const currentHourStr = `${y}-${mo}-${da}T${hh}`;

            try {
                // marineと風の両方が揃うまで待つ(タイムアウトで中断しない)
                const [mRes, wRes] = await Promise.all([
                    fetch(mUrl).then(r => r.json()),
                    fetch(wUrl).then(r => r.json())
                ]);
                const mDataList = Array.isArray(mRes) ? mRes : [mRes];
                const wDataList = Array.isArray(wRes) ? wRes : [wRes];

                globalData = [];
                globalTide = [];

                spots.forEach((spot, i) => {
                    const mHourly = mDataList[i] ? mDataList[i].hourly : null;
                    const wHourly = wDataList[i] ? wDataList[i].hourly : null;

                    // marineデータが欠損しているポイントは「データなし」で埋める
                    // (途中でreturnしても globalData/globalTide のインデックスがずれないようにする)
                    if (!mHourly || !mHourly.wave_height) {
                        globalTide.push(new Map());
                        globalData.push(Array.from({ length: totalHours }, () => ({ hasData: false })));
                        return;
                    }

                    let startIndex = 0;
                    if (mHourly && mHourly.time) {
                        const idx = mHourly.time.findIndex(t => t.startsWith(currentHourStr));
                        if (idx !== -1) startIndex = idx;
                    }
                    let wStart = startIndex;
                    if (wHourly && wHourly.time) {
                        const widx = wHourly.time.findIndex(t => t.startsWith(currentHourStr));
                        if (widx !== -1) wStart = widx;
                    }

                    const tideMap = new Map();
                    if (mHourly.time && mHourly.sea_level_height_msl) {
                        mHourly.time.forEach((t, ti) => {
                            const v = mHourly.sea_level_height_msl[ti];
                            if (v !== null && v !== undefined) tideMap.set(t, v);
                        });
                    }
                    globalTide.push(tideMap);

                    const spotData = [];
                    for (let k = 0; k < totalHours; k++) {
                        const targetIdx = startIndex + k;
                        if (!mHourly.wave_height[targetIdx] && mHourly.wave_height[targetIdx] !== 0) {
                            spotData.push({ hasData: false });
                            continue;
                        }
                        let rawWaveHeight = mHourly.wave_height[targetIdx];
                        if (spot.adjust) rawWaveHeight *= spot.adjust;
                        const wIdx = wStart + k;
                        spotData.push({
                            hasData: true,
                            wave_height: rawWaveHeight,
                            swell_dir: mHourly.swell_wave_direction ? mHourly.swell_wave_direction[targetIdx] : null,
                            swell_period: mHourly.swell_wave_period ? mHourly.swell_wave_period[targetIdx] : null,
                            wind_speed: (wHourly && wHourly.wind_speed_10m) ? wHourly.wind_speed_10m[wIdx] : null,
                            wind_dir: (wHourly && wHourly.wind_direction_10m) ? wHourly.wind_direction_10m[wIdx] : null
                        });
                    }
                    globalData.push(spotData);
                });

                document.getElementById('loading-overlay').style.display = 'none';
                updateMapState(currentHourIndex);
            } catch (e) {
                console.error(e);
                document.getElementById('loading-overlay').innerText = "データ取得エラー";
            }
        }

        // --- Main Update ---
        function updateMapState(timeIndex) {
            const targetDate = hourLabels[timeIndex];
            const mm = targetDate.getMonth() + 1;
            const dd = targetDate.getDate();
            const hh = targetDate.getHours();
            const timeStr = `${mm}/${dd} ${String(hh).padStart(2,'0')}:00`;
            
            document.getElementById('current-time-display').innerText = timeIndex === 0 ? "現在" : timeStr;
            document.getElementById('p-data-time').innerText = timeStr;

            // Markers
            spots.forEach((spot, i) => {
                // データ取得前/取得失敗時でも落ちないようにガード
                const data = globalData[i] ? globalData[i][timeIndex] : null;
                let iconHtml = '';

                if (data && data.hasData) {
                    const wh = effHeight(spot, data);   // うねりの入りやすさを反映した実効波高
                    const ws = data.wind_speed;
                    const wd = data.wind_dir;

                    let cClass = 'c-calm';
                    if(wh >= 0.5) cClass = 'c-mod';
                    if(wh >= 1.5) cClass = 'c-high';

                    // 風データがある場合のみ風向リングを描画(矢印は風が「吹いていく」向き)
                    const hasWind = (ws !== null && ws !== undefined && wd !== null && wd !== undefined);
                    let windRingHtml = '';
                    if (hasWind) {
                        // 風速による矢印色(弱風=青 / 中風=黄 / 強風=赤)
                        let windArrowColor = "#e74c3c";
                        if (ws < 4.0) windArrowColor = "#3498db";
                        else if (ws < 8.0) windArrowColor = "#f1c40f";
                        windRingHtml = `<div class="wind-ring" style="transform: rotate(${wd + 180}deg)"><div class="arrow-pointer" style="border-bottom-color: ${windArrowColor}"></div></div>`;
                    }

                    iconHtml = `
                        <div class="surf-pin-container">
                            ${windRingHtml}
                            <div class="wave-core ${cClass}"></div>
                        </div>
                    `;
                } else {
                    iconHtml = `
                        <div class="surf-pin-container">
                            <div class="wave-core c-none"></div>
                        </div>
                    `;
                }

                // アイコン生成は新規/更新で共通化
                const icon = L.divIcon({ className: 'custom-div', html: iconHtml, iconSize: [50, 50], iconAnchor: [25, 25] });
                if(!spotMarkers[i]) {
                    const m = L.marker([spot.lat, spot.lon], {icon: icon, zIndexOffset: 1000}).addTo(map);

                    m.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        selectedSpotIndex = i;
                        renderInfoPanel(i);
                    });
                    spotMarkers.push(m);
                } else {
                    spotMarkers[i].setIcon(icon);
                }
            });


            if(selectedSpotIndex !== null) {
                renderInfoPanel(selectedSpotIndex);
            }
        }

        function renderInfoPanel(index) {
            // データ取得前/取得失敗時でも落ちないようにガード
            const data = globalData[index] ? globalData[index][currentHourIndex] : null;
            const spot = spots[index];
            const targetDate = hourLabels[currentHourIndex];
            const tideName = getTideName(targetDate);
            const tideTrend = getTideTrend(index, targetDate);
            const fitEl = document.getElementById('p-swell-fit');

            document.getElementById('p-name').innerText = spot.name;

            if (data && data.hasData) {
                const wh = data.wave_height;
                const ws = data.wind_speed;
                const swellDir = data.swell_dir;
                const wd = data.wind_dir;

                const exp = swellExposure(spot, swellDir);
                const eff = wh * exp.factor;            // 実際にポイントに入る波高
                const per = data.swell_period;
                document.getElementById('p-wave-cond').innerText = getSurfConditionText(eff);
                // メインは実効波高。括弧内に沖(オープン)の波高を補足
                document.getElementById('p-wave').innerText =
                    `${eff.toFixed(2)} m （沖 ${wh.toFixed(2)}m）`;
                // うねり方向が欠損している時刻は「--」表示(nullを北0°と誤表示しない)
                document.getElementById('p-swell').innerText =
                    (swellDir === null || swellDir === undefined)
                        ? '--'
                        : `${getDirText(swellDir)} (${Math.round(swellDir)}°)` + (per ? ` ${per.toFixed(0)}s` : '');
                // うねり相性(向き)の表示: ポイントの向きとうねり到来方向の合い具合
                if (exp.label) {
                    fitEl.innerText = (exp.ang !== null) ? `${exp.label}（差${exp.ang}°）` : exp.label;
                    fitEl.className = `sub-val ${exp.cls}`;
                } else {
                    fitEl.innerText = '';
                    fitEl.className = 'sub-val';
                }
                if (ws !== null && ws !== undefined) {
                    document.getElementById('p-wind').innerText = `${ws.toFixed(1)} m/s`;
                    // 風向のみ欠損のケースに備えてガード
                    document.getElementById('p-wdir').innerText =
                        (wd !== null && wd !== undefined) ? `${getDirText(wd)} (${Math.round(wd)}°)` : '--';
                } else {
                    document.getElementById('p-wind').innerText = "—";
                    document.getElementById('p-wdir').innerText = "（風データ取得不可）";
                }
            } else {
                document.getElementById('p-wave-cond').innerText = "データなし";
                document.getElementById('p-wave').innerText = "-- m";
                document.getElementById('p-swell').innerText = "--";
                fitEl.innerText = '--';
                fitEl.className = 'sub-val';
                document.getElementById('p-wind').innerText = "--";
                document.getElementById('p-wdir').innerText = "--";
            }

            document.getElementById('p-tide-name').innerText = tideName.name;
            document.getElementById('p-moon-age').innerText = `(月齢 ${tideName.moonAge})`;
            const trendEl = document.getElementById('p-tide-trend');
            trendEl.innerText = tideTrend.text;
            trendEl.className = `val ${tideTrend.cls}`;

            drawTideGraph(index, targetDate);
            panel.style.display = 'block';
        }

        const slider = document.getElementById('time-slider');
        const playBtn = document.getElementById('play-btn');

        slider.addEventListener('input', (e) => {
            currentHourIndex = parseInt(e.target.value);
            updateMapState(currentHourIndex);
            if(isPlaying) stopPlay();
        });

        playBtn.addEventListener('click', () => {
            if(isPlaying) stopPlay();
            else startPlay();
        });

        function startPlay() {
            isPlaying = true;
            playBtn.innerText = "||";
            playInterval = setInterval(() => {
                currentHourIndex++;
                if(currentHourIndex > 119) currentHourIndex = 0;
                slider.value = currentHourIndex;
                updateMapState(currentHourIndex);
            }, 1000); 
        }

        function stopPlay() {
            isPlaying = false;
            playBtn.innerText = "▶";
            clearInterval(playInterval);
        }

        fetchForecastData();

    </script>
</body>
</html>
