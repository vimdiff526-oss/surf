<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Surf Condition Map (5 Days)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        /* 背景色を少し淡いグレーに変更（地図に合わせる） */
        #map { height: 100%; width: 100%; background: #eee; }

        /* --- 情報パネル --- */
        #info-panel {
            position: absolute; top: 15px; right: 15px; width: 280px;
            background: rgba(255, 255, 255, 0.98); 
            padding: 12px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000; display: none;
            backdrop-filter: blur(5px);
            pointer-events: auto; 
        }
        
        #p-data-time {
            position: absolute; top: 12px; right: 15px;
            font-size: 0.75rem; color: #e74c3c; font-weight: bold;
        }

        h3#p-name {
            margin-top: 0; margin-bottom: 8px;
            font-size: 1.1rem;
            line-height: 1.2;
        }

        .row { 
            display: flex; justify-content: space-between; 
            margin-bottom: 6px;
            border-bottom: 1px solid #eee; 
            padding-bottom: 3px;
            align-items: baseline;
        }
        
        .label { color: #666; font-size: 0.8rem; }
        .val { font-weight: bold; color: #333; text-align: right; font-size: 0.9rem; }
        .sub-val { font-size: 0.75rem; color: #888; font-weight: normal; display: block; line-height: 1.1; }
        
        .note-text { 
            font-size: 0.65rem; color: #999; 
            margin-top: 2px; margin-bottom: 6px; 
            line-height: 1.2; text-align: right; 
        }

        .tide-tag {
            display: inline-block; padding: 1px 6px; border-radius: 3px; 
            font-size: 0.75rem; color: white; background: #555; margin-right: 4px;
        }
        .tide-trend { font-weight: bold; color: #007bff; font-size: 0.85rem; }
        .sw-good { color: #1e8e3e; font-weight: bold; }
        .sw-ok   { color: #2e9e4f; }
        .sw-weak { color: #f39c12; }
        .sw-bad  { color: #e74c3c; font-weight: bold; }
        .tide-trend.down { color: #dc3545; }

        #tide-graph-container {
            margin-top: 4px; text-align: center;
            background: linear-gradient(to bottom, #fcfcfc, #f0f8ff);
            border-radius: 6px; padding: 5px 0; border: 1px solid #e0e0e0;
        }
        canvas { width: 100%; height: 50px; display: block; }
        .graph-labels { font-size: 0.65rem; color:#999; display:flex; justify-content:space-between; padding:0 8px; margin-top:2px; }

        /* --- マーカー --- */
        .surf-pin-container {
            position: relative; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .wave-core {
            width: 16px; height: 16px; border-radius: 50%; border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 2; transition: all 0.3s ease;
        }
        .surf-pin-container:hover .wave-core { transform: scale(1.2); box-shadow: 0 0 15px rgba(0,0,0,0.5); cursor: pointer; }

        .wind-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; transition: transform 0.5s linear;
        }
        .arrow-pointer {
            position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-bottom: 14px solid #888; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        .c-calm { background: #3498db; }
        .c-mod { background: #f1c40f; }
        .c-high { background: #e74c3c; }
        .c-none { background: #b0b0b0; }

        /* 背景風アニメーション */
        .wind-arrow-icon {
            display: flex; align-items: center; justify-content: center; pointer-events: none; 
        }
        .arrow-svg path {
            animation-name: flow; animation-timing-function: linear; animation-iteration-count: infinite;
        }
        @keyframes flow {
            0% { opacity: 0; transform: translateY(8px); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-8px); }
        }

        /* --- タイムスライダー & コントロール --- */
        #time-control {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: rgba(255,255,255,0.95); padding: 12px 20px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 2000; 
            display: flex; flex-direction: row; align-items: center; gap: 15px;
            transition: all 0.3s ease;
        }

        #play-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; flex-shrink: 0;
            background: #3498db; color: white; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #play-btn:hover { background: #2980b9; }
        
        .slider-wrapper { flex-grow: 1; position: relative; }
        
        input[type=range] { 
            width: 100%; cursor: pointer; margin: 0;
            height: 6px; -webkit-appearance: none; background: #ddd; border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; background: #3498db; border-radius: 50%; cursor: pointer;
        }

        /* 日付ラベル (JSで生成) */
        .slider-labels {
            display: flex; justify-content: space-between; margin-top: 4px;
            font-size: 0.6rem; color: #666; padding: 0 2px;
        }
        
        #current-time-display {
            font-size: 0.95rem; font-weight: bold; color: #333; min-width: 110px; text-align: center;
        }

        /* --- Copyright --- */
        #copyright {
            position: absolute; bottom: 5px; left: 10px; 
            font-size: 0.6rem; color: rgba(0,0,0,0.6);
            z-index: 1000; pointer-events: auto;
            text-align: left;
            background: rgba(255,255,255,0.7);
            padding: 2px 6px; border-radius: 4px;
            line-height: 1.2;
        }
        #copyright a { color: #333; text-decoration: none; border-bottom: 1px dotted #999; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; color: #555;
        }

        /* --- スマホ用レイアウト調整 --- */
        @media (max-width: 600px) {
            #time-control {
                bottom: 35px; padding: 10px 15px; width: 92%; border-radius: 15px;
                flex-wrap: wrap; gap: 8px;
            }
            
            #current-time-display {
                width: 100%; order: -1; margin-bottom: 2px; font-size: 1.0rem;
                border-bottom: 1px solid #eee; padding-bottom: 4px;
            }

            #play-btn { width: 36px; height: 36px; font-size: 0.9rem; }
            .slider-wrapper { width: calc(100% - 46px); }
            
            #info-panel {
                width: 90%; 
                top: 15px; 
                left: 0; right: 0; margin: 0 auto; 
                padding: 10px 15px;
            }
            
            #copyright { bottom: 2px; left: 5px; font-size: 0.55rem; padding: 1px 4px;}
        }
    </style>
</head>
<body>

    <div id="loading-overlay">データ取得中...</div>

    <div id="map"></div>
    
    <div id="copyright">
        &copy; 2025 Slosea. All rights reserved.<br>
        Weather data by <a href="https://open-meteo.com/" target="_blank">Open-Meteo.com</a> | Map &copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>
    </div>

    <div id="time-control">
        <div id="current-time-display">現在</div>
        <button id="play-btn">▶</button>
        <div class="slider-wrapper">
            <input type="range" id="time-slider" min="0" max="119" value="0" step="1">
            <div id="slider-labels" class="slider-labels">
                </div>
        </div>
    </div>

    <div id="info-panel">
        <div id="p-data-time">現在</div>
        <h3 id="p-name">-</h3>
        
        <div class="row" style="border-bottom: none; margin-bottom: 0;">
            <span class="label">波高 (目安)</span>
            <div style="text-align:right;">
                <div id="p-wave-cond" class="val">-</div>
                <div id="p-wave" class="sub-val">- m</div>
            </div>
        </div>
        <div class="note-text" style="padding-bottom: 4px; border-bottom: 1px solid #eee;">
            ※地形や潮回りによりサイズは前後します
        </div>

        <div class="row">
            <span class="label">うねり</span>
            <div style="text-align:right;">
                <span id="p-swell" class="val">-</span>
                <div id="p-swell-q" class="sub-val">-</div>
            </div>
        </div>

        <div class="row">
            <span class="label">風速</span>
            <div style="text-align:right;">
                <span id="p-wind" class="val">-</span>
                <div id="p-wdir" class="sub-val">-</div>
            </div>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin: 4px 0 8px 0;">

        <div class="row" style="border: none; margin-bottom: 2px;">
            <span class="label">潮回り</span>
            <div style="text-align:right;">
                <div style="margin-bottom:2px;">
                    <span id="p-tide-name" class="tide-tag">-</span>
                    <span id="p-moon-age" style="font-size:0.75rem; color:#999;">(月齢 -)</span>
                </div>
                <div id="p-tide-trend" class="val">-</div>
            </div>
        </div>

        <div id="tide-graph-container">
            <canvas id="tideCanvas" width="280" height="50"></canvas>
            <div class="graph-labels">
                <span>0</span><span>6</span><span>12</span><span>18</span><span>24</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 状態管理 ---
        let globalData = [];
        // 各ポイントの実測潮位(海面高 MSL基準)。タイムスタンプ文字列 -> 海面高(m) のMapを保持
        let globalTide = [];
        let currentHourIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let selectedSpotIndex = null;
        
        // 5日分(120時間)のDateオブジェクト生成
        const today = new Date();
        const hourLabels = [];
        const daysToShow = 5;
        const totalHours = 24 * daysToShow;

        for(let i=0; i<totalHours; i++) {
            const d = new Date(today.getTime());
            d.setHours(today.getHours() + i);
            d.setMinutes(0);
            hourLabels.push(d);
        }

        // スライダーの下に日付ラベルを生成 (0, 24, 48, 72, 96時間目)
        const sliderLabelsEl = document.getElementById('slider-labels');
        sliderLabelsEl.innerHTML = '';
        for(let i=0; i<daysToShow; i++) {
            const target = hourLabels[i * 24];
            const m = target.getMonth() + 1;
            const d = target.getDate();
            const span = document.createElement('span');
            span.innerText = `${m}/${d}`;
            sliderLabelsEl.appendChild(span);
        }

        // --- マップ初期化 ---
        const southWest = L.latLng(20.0, 122.0);
        const northEast = L.latLng(46.0, 154.0);
        const bounds = L.latLngBounds(southWest, northEast);

        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false, 
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            minZoom: 5
        }).setView([37.5, 139.0], 5); 

        L.control.zoom({ position: 'topleft' }).addTo(map);

        // ★★★ 国土地理院の淡色地図に変更（日本語・シンプル） ★★★
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">地理院タイル</a>',
            bounds: bounds
        }).addTo(map);
        // ★★★ 変更終了 ★★★

        map.on('click', () => {
            document.getElementById('info-panel').style.display = 'none';
            selectedSpotIndex = null;
        });
        const panel = document.getElementById('info-panel');
        L.DomEvent.disableClickPropagation(panel);
        L.DomEvent.disableClickPropagation(document.getElementById('time-control'));

        // --- ポイント定義 ---

            { name: "北海道 - 室蘭イタンキ", lat: 42.3290, lon: 141.0250, face: 130.0, open: 190 }, // 修正: 沖1.3km→イタンキ浜のブレイク位置へ
            { name: "北海道 - 浜中", lat: 43.1376, lon: 145.1378, face: 150.0, open: 110 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(後静)

            { name: "岩手 - 久慈", lat: 40.199, lon: 141.7918, face: 85.0, open: 80 }, // 修正(全点見直し): 陸上→海岸沖のブレイク位置へ(湊町)
            { name: "岩手 - 浪板", lat: 39.3849, lon: 141.9394, face: 80.0, open: 50 }, // 修正(GSI地名検索): 船越→浪板海岸へ(GSI地名)
            { name: "秋田 - 男鹿", lat: 39.9727, lon: 139.8418, face: 340.0, open: 130 }, // 修正: 男鹿の代表ポイント宮沢海岸(五里合)へ 
            { name: "宮城 - 仙台新港", lat: 38.276, lon: 141.026, face: 140.0, open: 110 },

        const spotMarkers = [];
        const windLayerGroup = L.layerGroup().addTo(map);

        function getDirText(deg) {

        function getSurfConditionText(height) {

        // --- うねりの「入りやすさ」判定 ---
        // 各ポイントの face(外洋に面する方位) と open(外洋が開けている角度幅) を使い、
        // うねりの到来方向(swellFrom)がそのポイントに入るかを評価する。
        // 湾(openが小さい)ほど受け入れ角が狭く、岬(openが大きい)ほど広く拾える。
        function swellExposure(spot, swellFrom) {
            if (spot.face === undefined || swellFrom === null || swellFrom === undefined) {
                return { factor: 1.0, label: '', cls: '', ang: null };
            }
            // face とうねり到来方向の角度差(0〜180°)
            const diff = Math.abs(((swellFrom - spot.face + 540) % 360) - 180);
            // 受け入れ半角: 開け幅の半分 + 回折ぶん12°(湾40°〜岬120°でクランプ)
            const half = Math.min(Math.max((spot.open || 160) / 2 + 12, 40), 120);
            const ratio = diff / half;
            // 向きが合っているうねり(ratio<0.5)はフルに反応させ、
            // 受け入れ角の外側(0.5→1.0)でのみ滑らかに減衰させる(沖モデルの過小化を防ぐ)
            let f;
            if (ratio >= 1)        f = 0;
            else if (ratio < 0.5)  f = 1.0;
            else                   f = Math.cos(((ratio - 0.5) / 0.5) * (Math.PI / 2));
            const factor = 0.25 + 0.75 * f;                            // 向き外でも25%は残る(回折/反射/風波)
            let label, cls;
            if (ratio < 0.45)      { label = '◎ ばっちり';     cls = 'sw-good'; }
            else if (ratio < 0.80) { label = '○ 入る';         cls = 'sw-ok';   }
            else if (ratio < 1.00) { label = '△ 弱め(オフ気味)'; cls = 'sw-weak'; }
            else                   { label = '× 向き合わず';    cls = 'sw-bad';  }
            return { factor, label, cls, ang: Math.round(diff) };
        }

        // ポイントに実際に入る波高(沖の波高 × うねりの入りやすさ)
        function effHeight(spot, data) {
            const e = swellExposure(spot, data.swell_dir);
            return data.wave_height * e.factor;
        }

        // --- Tide Logic ---
        // 潮名(大潮/中潮など)は天文(月齢)で決まる暦上の区分なので月齢から算出する。
        // 一方、潮位グラフと満ち引き(上げ潮/下げ潮)は実測ベースの sea_level_height_msl を使う。
        function getTideName(targetDate) {
            const knownNewMoon = new Date(2024, 0, 11, 20, 57); // 2024-01-11 20:57(JST)の新月を基準
            const cycle = 29.53059; // 朔望月(日)
            const diffDays = (targetDate.getTime() - knownNewMoon.getTime()) / (1000 * 60 * 60 * 24);
            let moonAge = diffDays % cycle;
            if (moonAge < 0) moonAge += cycle;

            // 旧暦日(1〜30)に対応する潮名(海上保安庁の標準的な区分に準拠)
            const lunarDate = Math.floor(moonAge) + 1;
            const tideTable = {
                1:'大潮', 2:'大潮', 3:'中潮', 4:'中潮', 5:'中潮', 6:'中潮', 7:'小潮', 8:'小潮', 9:'小潮',
                10:'長潮', 11:'若潮', 12:'中潮', 13:'中潮', 14:'中潮', 15:'大潮', 16:'大潮', 17:'大潮', 18:'大潮',
                19:'中潮', 20:'中潮', 21:'中潮', 22:'中潮', 23:'小潮', 24:'小潮', 25:'小潮', 26:'長潮', 27:'若潮',
                28:'中潮', 29:'中潮', 30:'大潮'
            };
            const name = tideTable[lunarDate] || '中潮';
            return { name, moonAge: moonAge.toFixed(1) };
        }

        // 指定ポイント・指定日時の実測潮位(海面高 m)を取得。なければ null
        function tideKey(d) {
            const y = d.getFullYear();
            const mo = String(d.getMonth() + 1).padStart(2, '0');
            const da = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            return `${y}-${mo}-${da}T${hh}:00`;
        }
        function getTideLevel(spotIndex, date) {
            const m = globalTide[spotIndex];
            if (!m) return null;
            const v = m.get(tideKey(date));
            return (v === undefined) ? null : v;
        }

        // 実測潮位の前後1時間から満ち引きの傾向を判定する
        function getTideTrend(spotIndex, date) {
            const cur = getTideLevel(spotIndex, date);
            if (cur === null) return { text: '-', cls: '' };
            const prevRaw = getTideLevel(spotIndex, new Date(date.getTime() - 3600 * 1000));
            const nextRaw = getTideLevel(spotIndex, new Date(date.getTime() + 3600 * 1000));
            const prev = (prevRaw === null) ? cur : prevRaw;
            const next = (nextRaw === null) ? cur : nextRaw;
            if (cur >= prev && cur >= next) return { text: '満潮付近 (止まり)', cls: 'tide-trend' };
            if (cur <= prev && cur <= next) return { text: '干潮付近 (止まり)', cls: 'tide-trend down' };
            if (next > cur) return { text: '上げ潮 ↗', cls: 'tide-trend' };
            return { text: '下げ潮 ↘', cls: 'tide-trend down' };
        }

        // --- Tide Graph (50px height) ---
        // 対象ポイント・対象日の実測潮位(0:00〜翌0:00)を折れ線で描画する
        function drawTideGraph(spotIndex, targetDate) {
            const canvas = document.getElementById('tideCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);

            // 対象日の0時〜翌0時(25点)の実測潮位を取得
            const dayStart = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate(), 0, 0, 0);
            const levels = [];
            for (let hr = 0; hr <= 24; hr++) {
                const d = new Date(dayStart.getTime());
                d.setHours(hr);
                levels.push(getTideLevel(spotIndex, d));
            }

            const valid = levels.filter(v => v !== null);
            if (valid.length < 2) {
                ctx.fillStyle = '#bbb';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('潮位データなし', w / 2, h / 2);
                return;
            }

            // 当日の最小〜最大で縦軸スケールを決める(変化が小さい場合は下限幅を確保)
            let min = Math.min(...valid);
            let max = Math.max(...valid);
            if (max - min < 0.2) { const mid = (max + min) / 2; min = mid - 0.5; max = mid + 0.5; }
            const range = max - min;
            const top = h * 0.15, bot = h * 0.9;
            const yOf = v => bot - ((v - min) / range) * (bot - top);
            const xOf = hr => (hr / 24) * w;

            const gradient = ctx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, "rgba(52, 152, 219, 0.6)");
            gradient.addColorStop(1, "rgba(52, 152, 219, 0.05)");

            // 塗りつぶし(下端→カーブ→下端で閉じる)
            ctx.beginPath();
            let started = false, firstX = 0, lastX = 0;
            for (let hr = 0; hr <= 24; hr++) {
                if (levels[hr] === null) continue;
                const x = xOf(hr), y = yOf(levels[hr]);
                if (!started) { firstX = x; ctx.moveTo(x, h); ctx.lineTo(x, y); started = true; }
                else ctx.lineTo(x, y);
                lastX = x;
            }
            ctx.lineTo(lastX, h);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // 潮位カーブ
            ctx.beginPath();
            started = false;
            for (let hr = 0; hr <= 24; hr++) {
                if (levels[hr] === null) continue;
                const x = xOf(hr), y = yOf(levels[hr]);
                if (!started) { ctx.moveTo(x, y); started = true; }
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = "#3498db";
            ctx.lineWidth = 2;
            ctx.stroke();

            // 現在時刻の縦線
            const curHour = targetDate.getHours() + targetDate.getMinutes() / 60;
            const curX = xOf(curHour);
            ctx.beginPath();
            ctx.moveTo(curX, 0);
            ctx.lineTo(curX, h);
            ctx.strokeStyle = "rgba(231, 76, 60, 0.8)";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 2]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 現在の潮位(前後の実測値を線形補間)とマーカー
            const h0 = Math.floor(curHour), h1 = Math.min(24, h0 + 1);
            let curLevel = null;
            if (levels[h0] !== null && levels[h1] !== null) {
                const f = curHour - h0;
                curLevel = levels[h0] * (1 - f) + levels[h1] * f;
            } else if (levels[h0] !== null) {
                curLevel = levels[h0];
            }
            if (curLevel !== null) {
                const cy = yOf(curLevel);
                ctx.beginPath();
                ctx.arc(curX, cy, 4, 0, Math.PI * 2);
                ctx.fillStyle = "#e74c3c";
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 現在潮位の数値(MSL基準)を表示
                ctx.fillStyle = "#e74c3c";
                ctx.font = "bold 9px sans-serif";
                const rightSide = curX > w * 0.8;
                ctx.textAlign = rightSide ? "right" : "left";
                ctx.fillText(`${curLevel.toFixed(2)}m`, rightSide ? curX - 6 : curX + 6, cy - 6);
            }
        }

        // --- 取得用ヘルパー: タイムアウト付きfetch ---
        function fetchJSON(url, ms) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            return fetch(url, { signal: ctrl.signal })
                .then(r => r.json())
                .finally(() => clearTimeout(timer));
        }

        // --- Data Fetching (5 Days Forecast) ---
        // 1) キャッシュ(localStorage)があれば即描画(待ち時間ゼロ) 2) marine(波/うねり/潮)を取得して更新
        // 3) 風(forecast)は後から非同期でマージ。風サーバが遅くてもマップは固まらない。
        async function fetchForecastData() {
            const lats = spots.map(s => s.lat).join(',');
            const lons = spots.map(s => s.lon).join(',');
            const mUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lats}&longitude=${lons}&hourly=wave_height,swell_wave_direction,swell_wave_period,sea_level_height_msl&timezone=Asia%2FTokyo&forecast_days=6`;
            const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=Asia%2FTokyo&forecast_days=6`;
            const overlay = document.getElementById('loading-overlay');

            // 現在の「年月日T時」。データは1時間単位なので同じ時刻ならキャッシュ有効
            const y = hourLabels[0].getFullYear();
            const mo = String(hourLabels[0].getMonth() + 1).padStart(2, '0');
            const da = String(hourLabels[0].getDate()).padStart(2, '0');
            const hh = String(hourLabels[0].getHours()).padStart(2, '0');
            const currentHourStr = `${y}-${mo}-${da}T${hh}`;
            const cacheKey = 'surfcache_' + currentHourStr;
            const toList = r => Array.isArray(r) ? r : [r];

            // marine応答から globalData / globalTide を構築
            function buildMarine(mDataList) {
                globalData = [];
                globalTide = [];
                spots.forEach((spot, i) => {
                    const mHourly = mDataList[i].hourly;
                    let startIndex = 0;
                    if (mHourly && mHourly.time) {
                        const idx = mHourly.time.findIndex(t => t.startsWith(currentHourStr));
                        if (idx !== -1) startIndex = idx;
                    }
                    const tideMap = new Map();
                    if (mHourly.time && mHourly.sea_level_height_msl) {
                        mHourly.time.forEach((t, ti) => {
                            const v = mHourly.sea_level_height_msl[ti];
                            if (v !== null && v !== undefined) tideMap.set(t, v);
                        });
                    }
                    globalTide.push(tideMap);
                    const spotData = [];
                    for (let k = 0; k < totalHours; k++) {
                        const targetIdx = startIndex + k;
                        if (!mHourly.wave_height[targetIdx] && mHourly.wave_height[targetIdx] !== 0) {
                            spotData.push({ hasData: false });
                            continue;
                        }
                        let rawWaveHeight = mHourly.wave_height[targetIdx];
                        if (spot.adjust) rawWaveHeight *= spot.adjust;
                        spotData.push({
                            hasData: true,
                            wave_height: rawWaveHeight,
                            swell_dir: mHourly.swell_wave_direction[targetIdx],
                            swell_period: mHourly.swell_wave_period ? mHourly.swell_wave_period[targetIdx] : null,
                            wind_speed: null,
                            wind_dir: null
                        });
                    }
                    globalData.push(spotData);
                });
            }

            // 風応答を globalData にマージ
            function applyWind(wDataList) {
                spots.forEach((spot, i) => {
                    const wHourly = wDataList[i] && wDataList[i].hourly;
                    if (!wHourly || !wHourly.time) return;
                    let wStart = 0;
                    const idx = wHourly.time.findIndex(t => t.startsWith(currentHourStr));
                    if (idx !== -1) wStart = idx;
                    const sd = globalData[i];
                    if (!sd) return;
                    for (let k = 0; k < sd.length; k++) {
                        if (!sd[k] || !sd[k].hasData) continue;
                        const ti = wStart + k;
                        sd[k].wind_speed = wHourly.wind_speed_10m[ti];
                        sd[k].wind_dir = wHourly.wind_direction_10m[ti];
                    }
                });
            }

            // ① キャッシュがあれば即描画(ネットワークを待たない)
            let shown = false;
            try {
                const raw = localStorage.getItem(cacheKey);
                if (raw) {
                    const c = JSON.parse(raw);
                    if (c && c.m) {
                        buildMarine(toList(c.m));
                        if (c.w) applyWind(toList(c.w));
                        overlay.style.display = 'none';
                        updateMapState(currentHourIndex);
                        shown = true;
                    }
                }
            } catch (e) { /* キャッシュ不正は無視 */ }

            // ② 最新データを取得(marine先行・風は失敗可)
            const marineP = fetchJSON(mUrl, 30000);
            const windP = fetchJSON(wUrl, 30000).catch(() => null);

            let mRes = null, wRes = null;
            try {
                mRes = await marineP;
                buildMarine(toList(mRes));
                overlay.style.display = 'none';
                updateMapState(currentHourIndex);
                shown = true;
            } catch (e) {
                console.error(e);
                if (!shown) overlay.innerText = "波データの取得に失敗しました（時間をおいて再読込してください）";
                return;
            }

            // ③ 風が届いたらマージして再描画
            try {
                wRes = await windP;
                if (wRes) { applyWind(toList(wRes)); updateMapState(currentHourIndex); }
            } catch (e) { console.warn("風データ取得失敗:", e); }

            // ④ 取得できた最新をキャッシュ保存(次回は即表示)。古いキャッシュは掃除
            try {
                if (mRes) {
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const k = localStorage.key(i);
                        if (k && k.startsWith('surfcache_') && k !== cacheKey) localStorage.removeItem(k);
                    }
                    localStorage.setItem(cacheKey, JSON.stringify({ m: mRes, w: wRes }));
                }
            } catch (e) { /* 保存失敗(容量等)は無視 */ }
        }

        // --- Main Update ---
        function updateMapState(timeIndex) {
            const targetDate = hourLabels[timeIndex];
            const mm = targetDate.getMonth() + 1;
            const dd = targetDate.getDate();
            const hh = targetDate.getHours();
            const timeStr = `${mm}/${dd} ${String(hh).padStart(2,'0')}:00`;
            
            document.getElementById('current-time-display').innerText = timeIndex === 0 ? "現在" : timeStr;
            document.getElementById('p-data-time').innerText = timeStr;

            // Markers
            spots.forEach((spot, i) => {
                const data = globalData[i][timeIndex];
                let iconHtml = '';
                
                if (data && data.hasData) {
                    const wh = effHeight(spot, data);   // うねりの入りやすさを反映した実効波高
                    const ws = data.wind_speed;
                    const wd = data.wind_dir;

                    let cClass = 'c-calm';
                    if(wh >= 0.5) cClass = 'c-mod';
                    if(wh >= 1.5) cClass = 'c-high';

                    let waveScale = 1.3;
                    const hasWind = (ws !== null && ws !== undefined && wd !== null && wd !== undefined);
                    let windRotate = hasWind ? wd + 180 : 0;
                    let windArrowColor = "#888";
                    if(ws < 4.0) windArrowColor = "#3498db"; 
                    else if(ws < 8.0) windArrowColor = "#f1c40f"; 
                    else windArrowColor = "#e74c3c"; 

                    iconHtml = `
                        <div class="surf-pin-container">
                            ${hasWind ? `<div class="wind-ring" style="transform: rotate(${windRotate}deg)"><div class="arrow-pointer" style="border-bottom-color: ${windArrowColor}"></div></div>` : ``}
                            <div class="wave-core ${cClass}" style="transform: scale(${waveScale})"></div>
                        </div>
                    `;
                } else {
                    iconHtml = `
                        <div class="surf-pin-container">
                            <div class="wave-core c-none"></div>
                        </div>
                    `;
                }

                if(!spotMarkers[i]) {
                    const icon = L.divIcon({ className: 'custom-div', html: iconHtml, iconSize: [50, 50], iconAnchor: [25, 25] });
                    const m = L.marker([spot.lat, spot.lon], {icon: icon, zIndexOffset: 1000}).addTo(map);
                    
                    m.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        selectedSpotIndex = i;
                        renderInfoPanel(i);
                    });
                    spotMarkers.push(m);
                } else {
                    const icon = L.divIcon({ className: 'custom-div', html: iconHtml, iconSize: [50, 50], iconAnchor: [25, 25] });
                    spotMarkers[i].setIcon(icon);
                }
            });

            // Wind BG
            const vectors = [];
            spots.forEach((spot, i) => {
                const d = globalData[i][timeIndex];
                if(d && d.hasData && d.wind_speed > 0) {
                    const rad = d.wind_dir * (Math.PI / 180);
                    vectors.push({
                        lat: spot.lat, lon: spot.lon,
                        u: -d.wind_speed * Math.sin(rad),
                        v: -d.wind_speed * Math.cos(rad),
                        speed: d.wind_speed
                    });
                }
            });
            drawAnimatedWind(vectors);

            if(selectedSpotIndex !== null) {
                renderInfoPanel(selectedSpotIndex);
            }
        }

        function renderInfoPanel(index) {
            const data = globalData[index][currentHourIndex];
            const spot = spots[index];
            const panel = document.getElementById('info-panel');
            const targetDate = hourLabels[currentHourIndex];
            const tideName = getTideName(targetDate);
            const tideTrend = getTideTrend(index, targetDate);

            document.getElementById('p-name').innerText = spot.name;

            if (data && data.hasData) {
                const wh = data.wave_height;
                const ws = data.wind_speed;
                const swellDir = data.swell_dir;
                const wd = data.wind_dir;

                const exp = swellExposure(spot, swellDir);
                const eff = wh * exp.factor;            // 実際にポイントに入る波高
                const per = data.swell_period;
                document.getElementById('p-wave-cond').innerText = getSurfConditionText(eff);
                // メインは実効波高。括弧内に沖(オープン)の波高を補足
                document.getElementById('p-wave').innerText =
                    `${eff.toFixed(2)} m （沖 ${wh.toFixed(2)}m）`;
                document.getElementById('p-swell').innerText =
                    `${getDirText(swellDir)} (${Math.round(swellDir)}°)` + (per ? ` ${per.toFixed(0)}s` : '');
                // うねり相性(向き) の表示
                const swq = document.getElementById('p-swell-q');
                if (exp.label) {
                    swq.innerText = `${exp.label}　ポイント向き:${getDirText(spot.face)}`;
                    swq.className = 'sub-val ' + exp.cls;
                } else {
                    swq.innerText = '';
                }
                if (ws !== null && ws !== undefined) {
                    document.getElementById('p-wind').innerText = `${ws.toFixed(1)} m/s`;
                    document.getElementById('p-wdir').innerText = `${getDirText(wd)} (${Math.round(wd)}°)`;
                } else {
                    document.getElementById('p-wind').innerText = "取得中…";
                    document.getElementById('p-wdir').innerText = "";
                }
            } else {
                document.getElementById('p-wave-cond').innerText = "データなし";
                document.getElementById('p-wave').innerText = "-- m";
                document.getElementById('p-swell').innerText = "--";
                document.getElementById('p-swell-q').innerText = "";
                document.getElementById('p-wind').innerText = "--";
                document.getElementById('p-wdir').innerText = "--";
            }

            document.getElementById('p-tide-name').innerText = tideName.name;
            document.getElementById('p-moon-age').innerText = `(月齢 ${tideName.moonAge})`;
            const trendEl = document.getElementById('p-tide-trend');
            trendEl.innerText = tideTrend.text;
            trendEl.className = `val ${tideTrend.cls}`;

            drawTideGraph(index, targetDate);
            panel.style.display = 'block';
        }

        function drawAnimatedWind(vectors) {
            windLayerGroup.clearLayers();
            const gridStep = 0.7; 
            const latTop = 46.0, latBottom = 24.0;
            const lonLeft = 122.0, lonRight = 148.0;

            for(let lat = latTop; lat >= latBottom; lat -= gridStep) {
                for(let lon = lonLeft; lon <= lonRight; lon += gridStep) {
                    let sumU = 0, sumV = 0, sumW = 0;
                    let minDistance = 9999;
                    for(const vec of vectors) {
                        const d2 = Math.pow(lat - vec.lat, 2) + Math.pow(lon - vec.lon, 2);
                        const d = Math.sqrt(d2);
                        if(d < minDistance) minDistance = d;
                        const w = 1.0 / (d2 + 0.05); 
                        sumU += vec.u * w;
                        sumV += vec.v * w;
                        sumW += w;
                    }
                    if(minDistance > 4.5) continue;
                    if(sumW > 0) {
                        const u = sumU / sumW;
                        const v = sumV / sumW;
                        const speed = Math.sqrt(u*u + v*v);
                        let degree = (Math.atan2(-u, -v) * 180 / Math.PI) + 180; 
                        addAnimatedArrow(lat, lon, degree, speed);
                    }
                }
            }
        }

        function addAnimatedArrow(lat, lon, degree, speed) {
            let scale = 0.8; let opacity = 0.5;
            if(speed > 5) { scale = 1.0; opacity = 0.7; }
            if(speed > 10) { scale = 1.2; opacity = 0.9; }
            let animDuration = Math.max(0.5, 2.0 - (speed * 0.1));
            let animDelay = -Math.random() * 2;
            const svgArrow = `
                <svg width="30" height="30" viewBox="0 0 24 24" class="arrow-svg" style="transform: rotate(${degree}deg) scale(${scale}); opacity: ${opacity};">
                    <path d="M12 2 L6 18 L12 14 L18 18 Z" fill="#555" stroke="none" style="animation-duration: ${animDuration}s; animation-delay: ${animDelay}s;"/>
                </svg>
            `;
            const icon = L.divIcon({ className: 'wind-arrow-icon', html: svgArrow, iconSize: [30, 30], iconAnchor: [15, 15] });
            L.marker([lat, lon], { icon: icon, interactive: false, zIndexOffset: -100 }).addTo(windLayerGroup);
        }

        const slider = document.getElementById('time-slider');
        const playBtn = document.getElementById('play-btn');

        slider.addEventListener('input', (e) => {
            currentHourIndex = parseInt(e.target.value);
            updateMapState(currentHourIndex);
            if(isPlaying) stopPlay();
        });

        playBtn.addEventListener('click', () => {
            if(isPlaying) stopPlay();
            else startPlay();
        });

        function startPlay() {
            isPlaying = true;
            playBtn.innerText = "||";
            playInterval = setInterval(() => {
                currentHourIndex++;
                if(currentHourIndex > 119) currentHourIndex = 0;
                slider.value = currentHourIndex;
                updateMapState(currentHourIndex);
            }, 1000); 
        }

        function stopPlay() {
            isPlaying = false;
            playBtn.innerText = "▶";
            clearInterval(playInterval);
        }

        fetchForecastData();

    </script>
</body>
</html>
